<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Note - SmartNotes Summarizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation Header -->
  <nav class="navbar">
    <div class="container">
      <a href="dashboard.html" class="brand">
        <div class="brand-icon">✦</div>
        <span>SmartNotes</span>
      </a>
      <div class="nav-links">
        <span class="user-greeting" id="user-greeting">Loading user...</span>
        <a href="#" class="btn btn-secondary" id="logout-btn" style="padding: 6px 12px; font-size: 0.85rem;">Log Out</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container" style="flex: 1; max-width: 800px; padding-bottom: 40px;">
    <a href="dashboard.html" class="back-link">&larr; Back to Dashboard</a>

    <div style="margin-top: 30px; margin-bottom: 30px;">
      <h2 style="font-size: 1.8rem; font-weight: 700; margin-bottom: 8px;">Create New Note</h2>
      <p style="color: var(--text-muted);">Paste an article or upload a document to generate an AI summary instantly</p>
    </div>

    <!-- Tabs Container -->
    <div class="form-tabs">
      <button class="tab-btn active" id="tab-paste">Paste Text</button>
      <button class="tab-btn" id="tab-upload">Upload Document</button>
    </div>

    <!-- Card Container -->
    <div class="detail-pane" style="padding: 30px; border-radius: var(--radius-lg);">
      <!-- Pane 1: Paste Text -->
      <div class="form-pane active" id="pane-paste">
        <form id="paste-form">
          <div class="form-group">
            <label for="paste-title">Note Title</label>
            <input type="text" id="paste-title" class="form-control" placeholder="E.g., Meeting notes, Article summary..." required>
          </div>
          <div class="form-group">
            <label for="paste-text">Original Text</label>
            <textarea id="paste-text" class="form-control" rows="12" placeholder="Paste your long text here..." style="resize: vertical;" required></textarea>
          </div>
          <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 10px;">
            ✦ Summarize with Gemini AI
          </button>
        </form>
      </div>

      <!-- Pane 2: Upload File -->
      <div class="form-pane" id="pane-upload">
        <form id="upload-form">
          <div class="form-group">
            <label for="upload-title">Note Title</label>
            <input type="text" id="upload-title" class="form-control" placeholder="E.g., Q3 Report Summary..." required>
          </div>
          
          <div class="form-group">
            <label>Document Upload</label>
            <div class="upload-zone" id="upload-zone">
              <div class="upload-icon">📤</div>
              <p><strong>Drag and drop</strong> your file here, or <strong>click to browse</strong></p>
              <span class="upload-constraints">Supports PDF and DOCX only (Max 10MB)</span>
              <input type="file" id="file-input" class="file-input" accept=".pdf,.docx">
            </div>
            
            <!-- File Display -->
            <div class="selected-file-display" id="selected-file-display">
              <div class="selected-file-info">
                <span class="selected-file-icon">📄</span>
                <span id="selected-file-name" style="font-weight: 500; font-size: 0.95rem;">document.pdf</span>
              </div>
              <button type="button" class="remove-file-btn" id="remove-file-btn">&times;</button>
            </div>
          </div>

          <button type="submit" class="btn btn-accent" style="width: 100%; margin-top: 20px;">
            ✦ Extract & Summarize
          </button>
        </form>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
