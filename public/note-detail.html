<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note Details - SmartNotes Summarizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation Header -->
  <nav class="navbar">
    <div class="container">
      <a href="dashboard.html" class="brand">
        <div class="brand-icon">✦</div>
        <span>SmartNotes</span>
      </a>
      <div class="nav-links">
        <span class="user-greeting" id="user-greeting">Loading user...</span>
        <a href="#" class="btn btn-secondary" id="logout-btn" style="padding: 6px 12px; font-size: 0.85rem;">Log Out</a>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="container" style="flex: 1; padding-bottom: 40px;">
    <a href="dashboard.html" class="back-link">&larr; Back to Dashboard</a>

    <!-- Container for dynamic content injection -->
    <div id="detail-container" style="margin-top: 30px;">
      <div style="text-align: center; padding: 60px;">
        <div class="spinner" style="margin: 0 auto 20px;"></div>
        <p style="color: var(--text-muted);">Fetching note details...</p>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
