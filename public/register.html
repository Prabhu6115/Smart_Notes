<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SmartNotes Summarizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <div class="brand" style="justify-content: center; margin-bottom: 20px;">
          <div class="brand-icon">✦</div>
          <span>SmartNotes</span>
        </div>
        <h1>Create Account</h1>
        <p>Start summarizing your documents with AI</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="Choose a username" required minlength="3">
        </div>
        
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="Create a password" required minlength="6">
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="Confirm your password" required minlength="6">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
          Register
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Log In</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
